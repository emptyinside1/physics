<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Интерактивная Статика</title>
    
    <!-- Подключаем стили Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Подключаем иконки Phosphor Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    
    <!-- Подключаем React -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Подключаем Babel для компиляции JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        .fade-in { animation: fadeIn 0.3s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
        /* Паттерн для фона-сетки */
        .bg-grid-pattern {
            background-image: linear-gradient(to right, #e2e8f0 1px, transparent 1px),
                              linear-gradient(to bottom, #e2e8f0 1px, transparent 1px);
            background-size: 20px 20px;
        }
    </style>
</head>
<body class="bg-slate-50 font-sans selection:bg-indigo-200">
    
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        // --- Вспомогательные компоненты ---
        const Fraction = ({ top, bottom }) => (
            <span className="inline-flex flex-col items-center justify-center align-middle mx-1">
                <span className="border-b border-current pb-0.5 px-1 leading-none">{top}</span>
                <span className="pt-0.5 px-1 leading-none">{bottom}</span>
            </span>
        );

        const Formula = ({ children, title }) => (
            <div className="my-4 overflow-hidden rounded-xl border border-slate-700 bg-slate-800 shadow-xl w-full max-w-2xl mx-auto">
                {title && <div className="bg-slate-900 px-4 py-2 text-xs font-semibold text-slate-400 uppercase tracking-wider text-center">{title}</div>}
                <div className="p-4 text-center font-mono text-lg text-amber-300 flex flex-wrap items-center justify-center gap-2 overflow-x-auto">
                    {children}
                </div>
            </div>
        );

        const Section = ({ iconClass, title, children, color = "indigo" }) => {
            const colorMap = {
                blue: "text-blue-500 bg-blue-50 border-blue-100",
                emerald: "text-emerald-500 bg-emerald-50 border-emerald-100",
                amber: "text-amber-500 bg-amber-50 border-amber-100",
                rose: "text-rose-500 bg-rose-50 border-rose-100",
                indigo: "text-indigo-500 bg-indigo-50 border-indigo-100",
                purple: "text-purple-500 bg-purple-50 border-purple-100",
                slate: "text-slate-600 bg-slate-50 border-slate-200",
            };

            const headerBg = colorMap[color].replace('text-', 'bg-').replace('50', '50/50').replace('bg-', '');

            return (
                <section className="mb-12 bg-white rounded-2xl shadow-sm border border-slate-100 overflow-hidden">
                    <div className={`p-6 border-b flex items-center gap-4 ${headerBg}`}>
                        <div className={`p-3 rounded-xl bg-white shadow-sm flex items-center justify-center ${colorMap[color].split(' ')[0]}`}>
                            <i className={`${iconClass} text-2xl font-bold`}></i>
                        </div>
                        <h2 className="text-2xl font-bold text-slate-800">{title}</h2>
                    </div>
                    <div className="p-6 text-slate-600 leading-relaxed text-lg">
                        {children}
                    </div>
                </section>
            );
        };

        const ExampleCard = ({ title, iconClass = "ph-target", condition, analysis, defaultOpen = false, color = "indigo" }) => {
            const [isOpen, setIsOpen] = useState(defaultOpen);

            return (
                <div className="border border-slate-200 rounded-xl overflow-hidden mb-6 shadow-sm bg-white">
                    <div className="p-5 border-b border-slate-100 bg-slate-50">
                        <h3 className="font-bold text-slate-800 mb-2 flex items-center gap-2">
                            <i className={`ph ${iconClass} text-${color}-500 text-xl`}></i>
                            {title}
                        </h3>
                        <div className="text-slate-600 text-sm space-y-2">{condition}</div>
                    </div>
                    <button 
                        onClick={() => setIsOpen(!isOpen)}
                        className={`w-full p-3 bg-${color}-50 text-${color}-700 font-semibold flex items-center justify-center gap-2 hover:bg-${color}-100 transition-colors focus:outline-none`}
                    >
                        {isOpen ? 
                            <><i className="ph ph-caret-up text-lg"></i> Скрыть разбор</> : 
                            <><i className="ph ph-caret-down text-lg"></i> Показать разбор</>
                        }
                    </button>
                    {isOpen && (
                        <div className={`p-5 bg-${color}-50/30 text-slate-700 fade-in border-t border-${color}-100`}>
                            <div className="font-semibold text-slate-800 mb-3 text-lg border-b pb-2">Решение:</div>
                            <div className="space-y-4 text-sm leading-relaxed">{analysis}</div>
                        </div>
                    )}
                </div>
            );
        };

        const SvgDefs = () => (
            <svg width="0" height="0" className="absolute">
                <defs>
                    <marker id="arrow-blue" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
                        <path d="M 0 0 L 10 5 L 0 10 z" fill="#3b82f6" />
                    </marker>
                    <marker id="arrow-red" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
                        <path d="M 0 0 L 10 5 L 0 10 z" fill="#ef4444" />
                    </marker>
                    <marker id="arrow-emerald" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
                        <path d="M 0 0 L 10 5 L 0 10 z" fill="#10b981" />
                    </marker>
                    <marker id="arrow-amber" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
                        <path d="M 0 0 L 10 5 L 0 10 z" fill="#f59e0b" />
                    </marker>
                    <marker id="arrow-slate" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
                        <path d="M 0 0 L 10 5 L 0 10 z" fill="#64748b" />
                    </marker>
                    <marker id="arrow-indigo" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
                        <path d="M 0 0 L 10 5 L 0 10 z" fill="#6366f1" />
                    </marker>
                </defs>
            </svg>
        );

        function App() {
            return (
                <div className="min-h-screen">
                    <SvgDefs />
                    
                    {/* Header */}
                    <header className="bg-slate-900 text-white overflow-hidden relative">
                        <div className="absolute inset-0 opacity-20">
                            <svg className="w-full h-full" xmlns="http://www.w3.org/2000/svg">
                                <defs>
                                    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
                                        <path d="M 40 0 L 0 0 0 40" fill="none" stroke="currentColor" strokeWidth="0.5"/>
                                    </pattern>
                                </defs>
                                <rect width="100%" height="100%" fill="url(#grid)" />
                            </svg>
                        </div>
                        <div className="max-w-4xl mx-auto px-6 py-20 relative z-10 text-center">
                            <div className="inline-flex items-center gap-2 px-4 py-2 rounded-full bg-indigo-500/20 text-indigo-300 font-semibold mb-6 border border-indigo-500/30 shadow-inner">
                                <i className="ph ph-scales text-xl"></i> Теория Равновесия
                            </div>
                            <h1 className="text-5xl md:text-6xl font-extrabold mb-6 tracking-tight bg-clip-text text-transparent bg-gradient-to-r from-indigo-400 via-purple-400 to-amber-400">
                                Полная теория статики
                            </h1>
                            <p className="text-xl text-slate-300 max-w-2xl mx-auto">
                                Статика изучает условия, при которых абсолютно твердое тело находится в состоянии механического равновесия (покоится или движется равномерно и прямолинейно без вращения).
                            </p>
                        </div>
                    </header>

                    <main className="max-w-4xl mx-auto px-6 py-12">
                        
                        {/* 1. Суть явления */}
                        <Section iconClass="ph ph-puzzle-piece" title="1. Четыре краеугольных камня статики" color="indigo">
                            <p className="mb-8">Полное понимание статики базируется на четырех фундаментальных понятиях:</p>
                            
                            <div className="grid md:grid-cols-2 gap-6 mb-6">
                                <div className="bg-gradient-to-br from-slate-50 to-slate-100 rounded-xl p-6 border border-slate-200 shadow-sm relative overflow-hidden">
                                    <div className="absolute -right-4 -top-4 text-slate-200"><i className="ph ph-arrows-out-line-horizontal text-8xl"></i></div>
                                    <h4 className="font-bold text-indigo-800 mb-2 flex items-center gap-2 relative z-10">
                                        <div className="bg-indigo-100 text-indigo-700 w-6 h-6 rounded flex items-center justify-center text-sm">А</div>
                                        Отсутствие поступательного движения
                                    </h4>
                                    <p className="text-sm relative z-10">Чтобы тело не получало линейного ускорения, <strong>векторная сумма всех внешних сил</strong>, действующих на него, должна быть равна нулю. Это прямое следствие второго закона Ньютона.</p>
                                </div>
                                
                                <div className="bg-gradient-to-br from-slate-50 to-slate-100 rounded-xl p-6 border border-slate-200 shadow-sm relative overflow-hidden">
                                    <div className="absolute -right-4 -top-4 text-slate-200"><i className="ph ph-arrows-clockwise text-8xl"></i></div>
                                    <h4 className="font-bold text-amber-800 mb-2 flex items-center gap-2 relative z-10">
                                        <div className="bg-amber-100 text-amber-700 w-6 h-6 rounded flex items-center justify-center text-sm">Б</div>
                                        Отсутствие вращательного движения
                                    </h4>
                                    <p className="text-sm relative z-10">Чтобы тело не получало углового ускорения, алгебраическая <strong>сумма моментов всех сил</strong> относительно любой выбранной оси вращения должна быть равна нулю. Момент зависит от силы и плеча.</p>
                                </div>

                                <div className="bg-gradient-to-br from-slate-50 to-slate-100 rounded-xl p-6 border border-slate-200 shadow-sm md:col-span-2">
                                    <h4 className="font-bold text-emerald-800 mb-2 flex items-center gap-2">
                                        <div className="bg-emerald-100 text-emerald-700 w-6 h-6 rounded flex items-center justify-center text-sm">В</div>
                                        Центр масс и центр тяжести
                                    </h4>
                                    <p className="text-sm mb-3">В статике формой реального тела пренебрегать нельзя! Сила тяжести действует на каждую частицу тела.</p>
                                    <div className="flex items-start gap-4 bg-white p-4 rounded-lg border border-emerald-100">
                                        <i className="ph ph-push-pin text-emerald-500 text-2xl mt-1"></i>
                                        <p className="text-sm"><strong>Центр тяжести</strong> — это точка, через которую проходит линия действия равнодействующей всех сил тяжести при любом положении тела. Для однородных симметричных тел он совпадает с геометрическим центром.</p>
                                    </div>
                                </div>
                            </div>

                            <div className="bg-white border rounded-2xl p-6 shadow-sm">
                                <h4 className="font-bold text-rose-800 mb-4 flex items-center gap-2">
                                    <div className="bg-rose-100 text-rose-700 w-6 h-6 rounded flex items-center justify-center text-sm font-bold">Г</div>
                                    Виды равновесия
                                </h4>
                                <p className="text-sm mb-6 text-slate-600">Поведение тела при малом отклонении от положения равновесия определяет его тип:</p>
                                
                                <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
                                    {/* Устойчивое */}
                                    <div className="border border-slate-100 rounded-xl p-4 flex flex-col items-center text-center bg-slate-50/50">
                                        <div className="font-bold text-emerald-600 mb-2">Устойчивое</div>
                                        <svg viewBox="0 0 100 80" className="w-24 mb-3">
                                            <path d="M 10 40 Q 50 90, 90 40" fill="none" stroke="#64748b" strokeWidth="4" strokeLinecap="round" />
                                            <circle cx="50" cy="55" r="8" fill="#10b981" />
                                            <line x1="50" y1="55" x2="50" y2="70" stroke="#ef4444" strokeWidth="2" markerEnd="url(#arrow-red)" />
                                            <line x1="65" y1="45" x2="55" y2="52" stroke="#3b82f6" strokeWidth="2" markerEnd="url(#arrow-blue)" />
                                        </svg>
                                        <p className="text-xs text-slate-500">Возникают силы, возвращающие тело обратно. Центр тяжести при отклонении поднимается.</p>
                                    </div>
                                    {/* Неустойчивое */}
                                    <div className="border border-slate-100 rounded-xl p-4 flex flex-col items-center text-center bg-slate-50/50">
                                        <div className="font-bold text-rose-600 mb-2">Неустойчивое</div>
                                        <svg viewBox="0 0 100 80" className="w-24 mb-3">
                                            <path d="M 10 70 Q 50 20, 90 70" fill="none" stroke="#64748b" strokeWidth="4" strokeLinecap="round" />
                                            <circle cx="50" cy="35" r="8" fill="#ef4444" />
                                            <line x1="50" y1="35" x2="50" y2="50" stroke="#ef4444" strokeWidth="2" markerEnd="url(#arrow-red)" />
                                            <line x1="55" y1="38" x2="70" y2="50" stroke="#f59e0b" strokeWidth="2" markerEnd="url(#arrow-amber)" />
                                        </svg>
                                        <p className="text-xs text-slate-500">Возникают силы, удаляющие тело от исходной точки. Центр тяжести опускается.</p>
                                    </div>
                                    {/* Безразличное */}
                                    <div className="border border-slate-100 rounded-xl p-4 flex flex-col items-center text-center bg-slate-50/50">
                                        <div className="font-bold text-slate-600 mb-2">Безразличное</div>
                                        <svg viewBox="0 0 100 80" className="w-24 mb-3">
                                            <line x1="10" y1="60" x2="90" y2="60" stroke="#64748b" strokeWidth="4" strokeLinecap="round" />
                                            <circle cx="50" cy="52" r="8" fill="#64748b" />
                                            <line x1="50" y1="52" x2="50" y2="68" stroke="#ef4444" strokeWidth="2" markerEnd="url(#arrow-red)" />
                                        </svg>
                                        <p className="text-xs text-slate-500">Положение меняется, но равновесие сохраняется. Высота центра тяжести неизменна.</p>
                                    </div>
                                </div>
                            </div>
                        </Section>

                        {/* 2. Визуализация */}
                        <Section iconClass="ph ph-image" title="2. Главная визуализация" color="blue">
                            <p className="mb-6">
                                Схема сил, действующих на лестницу, прислоненную к стене. Отличный пример классической статической системы, где работают <strong>оба условия равновесия</strong>.
                            </p>
                            
                            <div className="bg-grid-pattern border-2 border-slate-300 rounded-2xl overflow-hidden relative shadow-inner mb-4">
                                <div className="absolute top-4 left-4 bg-white/90 backdrop-blur px-3 py-2 rounded-lg shadow border border-slate-200 text-xs font-bold text-slate-700 flex flex-col gap-1 z-10">
                                    <div className="flex items-center gap-2"><div className="w-3 h-1 bg-red-500"></div> Активные силы (mg)</div>
                                    <div className="flex items-center gap-2"><div className="w-3 h-1 bg-blue-500"></div> Реакции опор (N)</div>
                                    <div className="flex items-center gap-2"><div className="w-3 h-1 bg-emerald-500"></div> Сила трения (Fтр)</div>
                                </div>

                                <svg viewBox="0 0 500 350" className="w-full max-w-2xl mx-auto block drop-shadow-md">
                                    {/* Wall and Floor */}
                                    <line x1="100" y1="50" x2="100" y2="280" stroke="#64748b" strokeWidth="6" strokeLinecap="round" />
                                    <line x1="80" y1="280" x2="450" y2="280" stroke="#64748b" strokeWidth="6" strokeLinecap="round" />
                                    
                                    {/* Wall/Floor Hatching */}
                                    <path d="M 90 70 L 100 80 M 90 110 L 100 120 M 90 150 L 100 160 M 90 190 L 100 200 M 90 230 L 100 240 M 90 270 L 100 280" stroke="#cbd5e1" strokeWidth="2" />
                                    <path d="M 120 280 L 110 290 M 160 280 L 150 290 M 200 280 L 190 290 M 240 280 L 230 290 M 280 280 L 270 290 M 320 280 L 310 290 M 360 280 L 350 290 M 400 280 L 390 290" stroke="#cbd5e1" strokeWidth="2" />

                                    {/* Axis marks */}
                                    <text x="50" y="70" fontSize="14" fontWeight="bold" fill="#94a3b8">Y</text>
                                    <line x1="70" y1="280" x2="70" y2="60" stroke="#cbd5e1" strokeWidth="2" markerEnd="url(#arrow-slate)" strokeDasharray="4,4" />
                                    
                                    <text x="430" y="315" fontSize="14" fontWeight="bold" fill="#94a3b8">X</text>
                                    <line x1="100" y1="300" x2="440" y2="300" stroke="#cbd5e1" strokeWidth="2" markerEnd="url(#arrow-slate)" strokeDasharray="4,4" />

                                    {/* Ladder */}
                                    <line x1="100" y1="90" x2="300" y2="280" stroke="#d97706" strokeWidth="12" strokeLinecap="round" />
                                    <circle cx="200" cy="185" r="5" fill="#1e293b" /> {/* CM */}

                                    {/* Angle alpha */}
                                    <path d="M 260 280 A 40 40 0 0 0 275 255" fill="none" stroke="#64748b" strokeWidth="2" />
                                    <text x="285" y="270" fontSize="16" fill="#64748b" fontWeight="bold">α</text>

                                    {/* Forces */}
                                    {/* mg */}
                                    <line x1="200" y1="185" x2="200" y2="260" stroke="#ef4444" strokeWidth="3" markerEnd="url(#arrow-red)" />
                                    <text x="210" y="240" fontSize="16" fontWeight="bold" fill="#ef4444">mg</text>

                                    {/* N wall */}
                                    <line x1="100" y1="90" x2="180" y2="90" stroke="#3b82f6" strokeWidth="3" markerEnd="url(#arrow-blue)" />
                                    <text x="140" y="80" fontSize="16" fontWeight="bold" fill="#3b82f6">Nст</text>

                                    {/* N floor */}
                                    <line x1="300" y1="280" x2="300" y2="200" stroke="#3b82f6" strokeWidth="3" markerEnd="url(#arrow-blue)" />
                                    <text x="310" y="230" fontSize="16" fontWeight="bold" fill="#3b82f6">Nпола</text>

                                    {/* F friction */}
                                    <line x1="300" y1="280" x2="210" y2="280" stroke="#10b981" strokeWidth="3" markerEnd="url(#arrow-emerald)" />
                                    <text x="230" y="270" fontSize="16" fontWeight="bold" fill="#10b981">Fтр</text>

                                    {/* Axis of rotation dot */}
                                    <circle cx="300" cy="280" r="6" fill="#8b5cf6" />
                                    <text x="315" y="295" fontSize="12" fill="#8b5cf6" fontWeight="bold">Ось вращения</text>
                                </svg>
                            </div>
                            <p className="text-sm text-center text-slate-500">
                                Спойлер: мы выберем точку опоры на пол как ось вращения. Это мгновенно "убьёт" моменты двух сил (Nпола и Fтр), так как их плечи станут равны нулю!
                            </p>
                        </Section>

                        {/* 3. Формулы */}
                        <Section iconClass="ph ph-math-operations" title="3. Математический аппарат (Формулы)" color="amber">
                            
                            <div className="grid md:grid-cols-2 gap-6 mb-6">
                                <div className="space-y-4">
                                    <div className="bg-slate-50 border border-slate-200 rounded-xl p-4">
                                        <h4 className="font-bold text-slate-800 text-sm mb-2 text-center uppercase">1. Условие равновесия (Силы)</h4>
                                        <div className="font-mono text-xl text-center font-bold text-indigo-700 bg-white p-2 rounded shadow-sm border border-indigo-100 mb-2">
                                            Σ F⃗<sub>i</sub> = 0
                                        </div>
                                        <p className="text-xs text-slate-600 text-center">В проекциях на оси X и Y:</p>
                                        <div className="font-mono text-sm text-center text-slate-800 flex justify-center gap-4 mt-1">
                                            <span>Σ F<sub>ix</sub> = 0</span>
                                            <span>Σ F<sub>iy</sub> = 0</span>
                                        </div>
                                    </div>

                                    <div className="bg-slate-50 border border-slate-200 rounded-xl p-4">
                                        <h4 className="font-bold text-slate-800 text-sm mb-2 text-center uppercase">Момент силы</h4>
                                        <div className="font-mono text-xl text-center font-bold text-amber-700 bg-white p-2 rounded shadow-sm border border-amber-100 mb-2">
                                            M = ± F · d
                                        </div>
                                        <ul className="text-xs text-slate-600 space-y-1">
                                            <li><span className="font-mono font-bold">M</span> — момент (Н·м)</li>
                                            <li><span className="font-mono font-bold">F</span> — сила (Н)</li>
                                            <li><span className="font-mono font-bold">d</span> — плечо (перпендикуляр от оси до линии действия)</li>
                                        </ul>
                                    </div>
                                </div>

                                <div className="space-y-4">
                                    <div className="bg-slate-50 border border-slate-200 rounded-xl p-4 h-full">
                                        <h4 className="font-bold text-slate-800 text-sm mb-2 text-center uppercase">2. Условие равновесия (Моменты)</h4>
                                        <div className="font-mono text-xl text-center font-bold text-rose-700 bg-white p-2 rounded shadow-sm border border-rose-100 mb-2">
                                            Σ M<sub>i</sub> = 0
                                        </div>
                                        <p className="text-xs text-slate-600 text-center mb-3">Правило моментов: сумма моментов, вращающих по часовой, равна сумме моментов против часовой.</p>
                                        
                                        <h4 className="font-bold text-slate-800 text-sm mb-2 mt-4 text-center uppercase">Сила трения покоя</h4>
                                        <div className="font-mono text-xl text-center font-bold text-emerald-700 bg-white p-2 rounded shadow-sm border border-emerald-100 mb-2">
                                            F<sub>тр</sub> ≤ μN
                                        </div>
                                        <p className="text-xs text-slate-600 text-center">Часто необходима для удержания тела.</p>
                                    </div>
                                </div>
                            </div>

                            <Formula title="Координата центра масс">
                                <span>x<sub>c</sub> = </span>
                                <Fraction 
                                    top={<span>m<sub>1</sub>x<sub>1</sub> + m<sub>2</sub>x<sub>2</sub> + ... + m<sub>n</sub>x<sub>n</sub></span>} 
                                    bottom={<span>m<sub>1</sub> + m<sub>2</sub> + ... + m<sub>n</sub></span>} 
                                />
                            </Formula>

                        </Section>

                        {/* 4. Алгоритм */}
                        <Section iconClass="ph ph-list-numbers" title="4. Универсальный алгоритм решения" color="emerald">
                            <p className="mb-6">Любая задача на статику в школе решается по этому железобетонному алгоритму:</p>
                            
                            <div className="space-y-4">
                                <div className="flex gap-4 items-start bg-white p-4 rounded-xl border border-slate-100 shadow-sm">
                                    <div className="flex-shrink-0 w-8 h-8 rounded-full bg-emerald-100 text-emerald-700 flex items-center justify-center font-bold font-mono">1</div>
                                    <div>
                                        <h5 className="font-bold text-slate-800 mb-1">Сделать крупный чертеж</h5>
                                        <p className="text-sm">Выделить тело (или систему), равновесие которого исследуется.</p>
                                    </div>
                                </div>
                                <div className="flex gap-4 items-start bg-white p-4 rounded-xl border border-slate-100 shadow-sm">
                                    <div className="flex-shrink-0 w-8 h-8 rounded-full bg-emerald-100 text-emerald-700 flex items-center justify-center font-bold font-mono">2</div>
                                    <div>
                                        <h5 className="font-bold text-slate-800 mb-1">Нарисовать все силы</h5>
                                        <p className="text-sm">Сила тяжести — из центра масс вниз, реакции опор — перпендикулярно поверхностям, натяжения — вдоль нитей.</p>
                                    </div>
                                </div>
                                <div className="flex gap-4 items-start bg-white p-4 rounded-xl border border-slate-100 shadow-sm">
                                    <div className="flex-shrink-0 w-8 h-8 rounded-full bg-emerald-100 text-emerald-700 flex items-center justify-center font-bold font-mono">3</div>
                                    <div>
                                        <h5 className="font-bold text-slate-800 mb-1">Записать Σ F = 0 в проекциях</h5>
                                        <p className="text-sm">Ввести оси X и Y. Написать два уравнения (для каждой оси), приравняв сумму к нулю.</p>
                                    </div>
                                </div>
                                <div className="flex gap-4 items-start bg-amber-50 p-4 rounded-xl border border-amber-200 shadow-sm relative overflow-hidden">
                                    <div className="absolute right-0 top-0 text-amber-100 opacity-50 text-6xl"><i className="ph ph-lightbulb"></i></div>
                                    <div className="flex-shrink-0 w-8 h-8 rounded-full bg-amber-500 text-white flex items-center justify-center font-bold font-mono relative z-10">4</div>
                                    <div className="relative z-10">
                                        <h5 className="font-bold text-amber-900 mb-1">Выбрать хитрую ось вращения</h5>
                                        <p className="text-sm text-amber-800"><strong>Стратегический совет:</strong> выбирайте точку, через которую проходит линия действия неизвестной силы, которую не нужно искать (тогда её плечо = 0, и она исчезнет из уравнения).</p>
                                    </div>
                                </div>
                                <div className="flex gap-4 items-start bg-white p-4 rounded-xl border border-slate-100 shadow-sm">
                                    <div className="flex-shrink-0 w-8 h-8 rounded-full bg-emerald-100 text-emerald-700 flex items-center justify-center font-bold font-mono">5</div>
                                    <div>
                                        <h5 className="font-bold text-slate-800 mb-1">Записать Σ M = 0</h5>
                                        <p className="text-sm">Определить плечи оставшихся сил и записать уравнение моментов с учетом знаков (по часовой и против).</p>
                                    </div>
                                </div>
                                <div className="flex gap-4 items-start bg-white p-4 rounded-xl border border-slate-100 shadow-sm">
                                    <div className="flex-shrink-0 w-8 h-8 rounded-full bg-emerald-100 text-emerald-700 flex items-center justify-center font-bold font-mono">6</div>
                                    <div>
                                        <h5 className="font-bold text-slate-800 mb-1">Математика</h5>
                                        <p className="text-sm">Решить полученную систему из 3-х алгебраических уравнений.</p>
                                    </div>
                                </div>
                            </div>
                        </Section>

                        {/* 5. Разбор примера (Лестница) */}
                        <Section iconClass="ph ph-chalkboard-teacher" title="5. Детальный разбор: Лестница у стены" color="purple">
                            <ExampleCard 
                                defaultOpen={true}
                                title="Условие задачи"
                                color="purple"
                                condition={
                                    <>
                                        <p>Однородная лестница массой <strong>m = 10 кг</strong> и длиной <strong>L</strong> прислонена к абсолютно гладкой вертикальной стене. Угол между лестницей и шероховатым полом составляет <strong>α = 60°</strong>.</p>
                                        <p className="mt-2"><strong>Найти:</strong> силу давления лестницы на стену (N<sub>ст</sub>) и минимальный коэффициент трения (μ) между лестницей и полом, при котором она не скользит. (g = 10 м/с²).</p>
                                    </>
                                }
                                analysis={
                                    <div className="space-y-6">
                                        <div>
                                            <div className="font-bold text-purple-800 mb-2">Шаг 1-2. Векторы (см. схему выше)</div>
                                            <ul className="list-disc pl-5 space-y-1">
                                                <li><span className="font-mono">mg</span> — из центра вниз</li>
                                                <li><span className="font-mono">N<sub>ст</sub></span> — горизонтально от стены</li>
                                                <li><span className="font-mono">N<sub>пола</sub></span> — вертикально вверх</li>
                                                <li><span className="font-mono">F<sub>тр</sub></span> — горизонтально к стене</li>
                                            </ul>
                                        </div>

                                        <div className="bg-white p-4 rounded border">
                                            <div className="font-bold text-purple-800 mb-2">Шаг 3. Первое условие равновесия</div>
                                            <p className="mb-1 text-slate-600">Ось X: (вправо - влево = 0)</p>
                                            <div className="font-mono bg-slate-100 p-2 rounded mb-3 inline-block">F<sub>тр</sub> - N<sub>ст</sub> = 0  ⇒  F<sub>тр</sub> = N<sub>ст</sub></div>
                                            
                                            <p className="mb-1 text-slate-600">Ось Y: (вверх - вниз = 0)</p>
                                            <div className="font-mono bg-slate-100 p-2 rounded inline-block">N<sub>пола</sub> - mg = 0  ⇒  N<sub>пола</sub> = mg = 100 Н</div>
                                        </div>

                                        <div className="bg-white p-4 rounded border">
                                            <div className="font-bold text-purple-800 mb-2">Шаг 4-5. Правило моментов</div>
                                            <p className="mb-2 text-slate-600">Выбираем <strong>ось вращения в точке опоры на пол</strong>. Моменты N<sub>пола</sub> и F<sub>тр</sub> исчезают.</p>
                                            
                                            <ul className="list-disc pl-5 space-y-2 mb-3">
                                                <li>Плечо силы <span className="font-mono text-red-600 font-bold">mg</span>: <span className="font-mono bg-slate-100 px-1 rounded">d₁ = (L/2)·cos(α)</span>. Вращает по часовой (-).</li>
                                                <li>Плечо силы <span className="font-mono text-blue-600 font-bold">N<sub>ст</sub></span>: <span className="font-mono bg-slate-100 px-1 rounded">d₂ = L·sin(α)</span>. Вращает против часовой (+).</li>
                                            </ul>
                                            <div className="font-mono font-bold text-lg bg-purple-100 text-purple-900 p-3 rounded text-center overflow-x-auto">
                                                N<sub>ст</sub> · L·sin(α) - mg · (L/2)·cos(α) = 0
                                            </div>
                                        </div>

                                        <div>
                                            <div className="font-bold text-purple-800 mb-2">Шаг 6. Вычисления</div>
                                            <p className="mb-2">1. Находим реакцию стены (длина L сокращается!):</p>
                                            <div className="font-mono bg-slate-50 p-3 rounded border text-sm space-y-2 mb-4">
                                                <div>N<sub>ст</sub> · sin(60°) = mg · 0.5 · cos(60°)</div>
                                                <div>N<sub>ст</sub> · (√3 / 2) = 100 · 0.5 · 0.5</div>
                                                <div>N<sub>ст</sub> · (√3 / 2) = 25</div>
                                                <div className="font-bold text-blue-700">N<sub>ст</sub> = 50 / √3 ≈ 28.9 Н</div>
                                            </div>

                                            <p className="mb-2">2. Находим коэффициент трения μ. Лестница на грани скольжения:</p>
                                            <div className="font-mono bg-slate-50 p-3 rounded border text-sm space-y-2">
                                                <div>F<sub>тр</sub> = μ · N<sub>пола</sub></div>
                                                <div className="text-slate-500">// Из оси X знаем, что F<sub>тр</sub> = N<sub>ст</sub> ≈ 28.9</div>
                                                <div className="text-slate-500">// Из оси Y знаем, что N<sub>пола</sub> = 100</div>
                                                <div>μ · 100 = 28.9</div>
                                                <div className="font-bold text-emerald-700">μ ≈ 0.29</div>
                                            </div>
                                        </div>

                                        <div className="mt-4 p-4 bg-purple-800 text-purple-100 rounded-lg text-center font-bold shadow-md">
                                            Ответ: N<sub>ст</sub> ≈ 28.9 Н; μ ≈ 0.29.
                                        </div>
                                    </div>
                                }
                            />
                        </Section>

                        {/* 6. Проверочная задача */}
                        <Section iconClass="ph ph-check-circle" title="6. Проверочная задача (Сможешь решить?)" color="emerald">
                            <p className="mb-4">Попробуйте применить изученный алгоритм. Сделайте рисунок на бумаге, прежде чем открывать решение!</p>
                            
                            <ExampleCard 
                                title="Горизонтальная балка с грузом"
                                iconClass="ph-barbell"
                                color="emerald"
                                condition={
                                    <>
                                        <p>Однородная балка массой <strong>M = 20 кг</strong> и длиной <strong>L = 5 метров</strong> покоится горизонтально на двух опорах, расположенных на её краях (левая опора в x=0, правая в x=5). На балку, на расстоянии <strong>1 метр от левого края</strong>, ставят точечный груз массой <strong>m = 10 кг</strong>.</p>
                                        <p className="mt-2 text-slate-800 font-semibold">Определите силы реакции левой и правой опор (N₁ и N₂). (g = 10 м/с²).</p>
                                        
                                        {/* Схема для задачи (показывается сразу, чтобы помочь ученику) */}
                                        <div className="mt-6 border p-4 bg-white rounded-xl">
                                            <div className="text-center text-xs font-bold text-slate-400 uppercase tracking-widest mb-4">Чертеж к задаче</div>
                                            <svg viewBox="-50 -50 600 200" className="w-full max-w-lg mx-auto">
                                                {/* Coordinates */}
                                                <line x1="0" y1="120" x2="500" y2="120" stroke="#cbd5e1" strokeWidth="2" strokeDasharray="4,4" />
                                                <text x="0" y="140" fontSize="12" fill="#64748b" textAnchor="middle">0 м</text>
                                                <text x="100" y="140" fontSize="12" fill="#64748b" textAnchor="middle">1 м</text>
                                                <text x="250" y="140" fontSize="12" fill="#64748b" textAnchor="middle">2.5 м</text>
                                                <text x="500" y="140" fontSize="12" fill="#64748b" textAnchor="middle">5 м</text>

                                                {/* Supports */}
                                                <path d="M 0 100 L -15 120 L 15 120 Z" fill="#94a3b8" />
                                                <path d="M 500 100 L 485 120 L 515 120 Z" fill="#94a3b8" />

                                                {/* Beam */}
                                                <rect x="0" y="80" width="500" height="20" fill="#d97706" rx="2" />
                                                
                                                {/* Load m */}
                                                <rect x="80" y="40" width="40" height="40" fill="#334155" rx="4" />
                                                <text x="100" y="65" fill="white" fontSize="14" fontWeight="bold" textAnchor="middle">m</text>

                                                {/* Unknown Forces (N1, N2) - blue */}
                                                <line x1="0" y1="80" x2="0" y2="10" stroke="#3b82f6" strokeWidth="4" markerEnd="url(#arrow-blue)" />
                                                <text x="10" y="20" fill="#3b82f6" fontSize="16" fontWeight="bold">N₁</text>

                                                <line x1="500" y1="80" x2="500" y2="10" stroke="#3b82f6" strokeWidth="4" markerEnd="url(#arrow-blue)" />
                                                <text x="470" y="20" fill="#3b82f6" fontSize="16" fontWeight="bold">N₂</text>

                                                {/* Gravity forces - red */}
                                                <line x1="100" y1="60" x2="100" y2="180" stroke="#ef4444" strokeWidth="3" markerEnd="url(#arrow-red)" />
                                                <text x="110" y="170" fill="#ef4444" fontSize="14" fontWeight="bold">mg (100 Н)</text>

                                                <circle cx="250" cy="90" r="4" fill="#1e293b" /> {/* CM of beam */}
                                                <line x1="250" y1="90" x2="250" y2="200" stroke="#ef4444" strokeWidth="4" markerEnd="url(#arrow-red)" />
                                                <text x="260" y="195" fill="#ef4444" fontSize="16" fontWeight="bold">Mg (200 Н)</text>
                                            </svg>
                                        </div>
                                    </>
                                }
                                analysis={
                                    <div className="space-y-4 text-emerald-900">
                                        <p><strong>1. Выбираем ось вращения:</strong> Умно будет выбрать левую опору (x=0). Тогда плечо силы N₁ равно нулю, и мы легко найдем N₂.</p>
                                        
                                        <p><strong>2. Записываем уравнение моментов относительно левой опоры:</strong></p>
                                        <ul className="list-disc pl-5 space-y-1 bg-white p-3 rounded font-mono text-sm border border-emerald-100">
                                            <li>Момент груза: <span className="text-red-600">M₁ = -mg · 1 = -100 · 1</span> (по часовой)</li>
                                            <li>Момент балки: <span className="text-red-600">M₂ = -Mg · 2.5 = -200 · 2.5</span> (сила тяжести приложена в центре балки L/2)</li>
                                            <li>Момент правой опоры: <span className="text-blue-600">M₃ = N₂ · 5</span> (против часовой)</li>
                                        </ul>
                                        
                                        <div className="font-mono bg-emerald-100 p-3 rounded font-bold text-center border border-emerald-200 shadow-inner">
                                            -100(1) - 200(2.5) + N₂(5) = 0<br/>
                                            5N₂ = 100 + 500<br/>
                                            5N₂ = 600  ⇒  <span className="text-blue-700">N₂ = 120 Н</span>
                                        </div>

                                        <p className="mt-4"><strong>3. Находим N₁ через сумму сил по оси Y (Σ F_y = 0):</strong></p>
                                        <div className="font-mono bg-emerald-100 p-3 rounded font-bold text-center border border-emerald-200 shadow-inner">
                                            N₁ + N₂ - mg - Mg = 0<br/>
                                            N₁ + 120 - 100 - 200 = 0<br/>
                                            N₁ = 300 - 120  ⇒  <span className="text-blue-700">N₁ = 180 Н</span>
                                        </div>

                                        <div className="bg-emerald-800 text-emerald-100 p-4 rounded-lg mt-4 text-center font-bold">
                                            Ответ: Сила реакции левой опоры N₁ = 180 Н; правой опоры N₂ = 120 Н.
                                            <div className="text-sm font-normal mt-1 opacity-80">(Проверка: N₁ больше, что логично, так как груз стоит ближе к левому краю).</div>
                                        </div>
                                    </div>
                                }
                            />
                        </Section>

                    </main>
                    
                    <footer className="bg-slate-900 text-slate-400 py-10 text-center text-sm border-t-4 border-indigo-500">
                        <p className="flex items-center justify-center gap-2">
                            <i className="ph ph-rocket-launch text-xl text-indigo-400"></i>
                            Интерактивный гид по физике. Успехов в изучении статики!
                        </p>
                    </footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
