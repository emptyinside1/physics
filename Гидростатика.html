<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Интерактивная Гидростатика</title>
    
    <!-- Подключаем стили Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Подключаем иконки Phosphor Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    
    <!-- Подключаем React -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Подключаем Babel для компиляции JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        .fade-in { animation: fadeIn 0.3s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
        /* Паттерн для фона (волны) */
        .bg-water-pattern {
            background-color: #f8fafc;
            background-image: radial-gradient(#bae6fd 1px, transparent 1px);
            background-size: 20px 20px;
        }
    </style>
</head>
<body class="bg-water-pattern font-sans selection:bg-cyan-200">
    
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        // --- Вспомогательные компоненты ---
        const Fraction = ({ top, bottom }) => (
            <span className="inline-flex flex-col items-center justify-center align-middle mx-1">
                <span className="border-b border-current pb-0.5 px-1 leading-none">{top}</span>
                <span className="pt-0.5 px-1 leading-none">{bottom}</span>
            </span>
        );

        const Formula = ({ children, title }) => (
            <div className="my-4 overflow-hidden rounded-xl border border-slate-700 bg-slate-800 shadow-xl w-full max-w-2xl mx-auto">
                {title && <div className="bg-slate-900 px-4 py-2 text-xs font-semibold text-cyan-400 uppercase tracking-wider text-center">{title}</div>}
                <div className="p-4 text-center font-mono text-lg text-white flex flex-wrap items-center justify-center gap-2 overflow-x-auto">
                    {children}
                </div>
            </div>
        );

        const Section = ({ iconClass, title, children, color = "cyan" }) => {
            const colorMap = {
                blue: "text-blue-500 bg-blue-50 border-blue-100",
                cyan: "text-cyan-600 bg-cyan-50 border-cyan-100",
                emerald: "text-emerald-500 bg-emerald-50 border-emerald-100",
                amber: "text-amber-500 bg-amber-50 border-amber-100",
                rose: "text-rose-500 bg-rose-50 border-rose-100",
                indigo: "text-indigo-500 bg-indigo-50 border-indigo-100",
                purple: "text-purple-500 bg-purple-50 border-purple-100",
            };

            const headerBg = colorMap[color].replace('text-', 'bg-').replace('50', '50/50').replace('bg-', '');

            return (
                <section className="mb-12 bg-white rounded-2xl shadow-sm border border-slate-100 overflow-hidden">
                    <div className={`p-6 border-b flex items-center gap-4 ${headerBg}`}>
                        <div className={`p-3 rounded-xl bg-white shadow-sm flex items-center justify-center ${colorMap[color].split(' ')[0]}`}>
                            <i className={`${iconClass} text-2xl font-bold`}></i>
                        </div>
                        <h2 className="text-2xl font-bold text-slate-800">{title}</h2>
                    </div>
                    <div className="p-6 text-slate-600 leading-relaxed text-lg">
                        {children}
                    </div>
                </section>
            );
        };

        const ExampleCard = ({ title, iconClass = "ph-target", condition, analysis, defaultOpen = false, color = "cyan" }) => {
            const [isOpen, setIsOpen] = useState(defaultOpen);

            return (
                <div className="border border-slate-200 rounded-xl overflow-hidden mb-6 shadow-sm bg-white">
                    <div className="p-5 border-b border-slate-100 bg-slate-50">
                        <h3 className="font-bold text-slate-800 mb-2 flex items-center gap-2">
                            <i className={`ph ${iconClass} text-${color}-600 text-xl`}></i>
                            {title}
                        </h3>
                        <div className="text-slate-600 text-sm space-y-2">{condition}</div>
                    </div>
                    <button 
                        onClick={() => setIsOpen(!isOpen)}
                        className={`w-full p-3 bg-${color}-50 text-${color}-700 font-semibold flex items-center justify-center gap-2 hover:bg-${color}-100 transition-colors focus:outline-none`}
                    >
                        {isOpen ? 
                            <><i className="ph ph-caret-up text-lg"></i> Скрыть разбор</> : 
                            <><i className="ph ph-caret-down text-lg"></i> Показать разбор</>
                        }
                    </button>
                    {isOpen && (
                        <div className={`p-5 bg-${color}-50/30 text-slate-700 fade-in border-t border-${color}-100`}>
                            <div className="font-semibold text-slate-800 mb-3 text-lg border-b pb-2">Решение:</div>
                            <div className="space-y-4 text-sm leading-relaxed">{analysis}</div>
                        </div>
                    )}
                </div>
            );
        };

        const SvgDefs = () => (
            <svg width="0" height="0" className="absolute">
                <defs>
                    <marker id="arrow-blue" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
                        <path d="M 0 0 L 10 5 L 0 10 z" fill="#3b82f6" />
                    </marker>
                    <marker id="arrow-red" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
                        <path d="M 0 0 L 10 5 L 0 10 z" fill="#ef4444" />
                    </marker>
                    <marker id="arrow-cyan" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
                        <path d="M 0 0 L 10 5 L 0 10 z" fill="#06b6d4" />
                    </marker>
                </defs>
            </svg>
        );

        function App() {
            return (
                <div className="min-h-screen">
                    <SvgDefs />
                    
                    {/* Header */}
                    <header className="bg-slate-900 text-white overflow-hidden relative">
                        <div className="absolute inset-0 opacity-30">
                            {/* Animated Water Background */}
                            <svg className="w-full h-full" viewBox="0 0 100 100" preserveAspectRatio="none">
                                <path d="M0,50 Q25,60 50,50 T100,50 L100,100 L0,100 Z" fill="#0891b2" opacity="0.3">
                                    <animate attributeName="d" dur="5s" repeatCount="indefinite"
                                        values="M0,50 Q25,60 50,50 T100,50 L100,100 L0,100 Z;
                                                M0,50 Q25,40 50,50 T100,50 L100,100 L0,100 Z;
                                                M0,50 Q25,60 50,50 T100,50 L100,100 L0,100 Z" />
                                </path>
                                <path d="M0,60 Q25,70 50,60 T100,60 L100,100 L0,100 Z" fill="#06b6d4" opacity="0.3">
                                    <animate attributeName="d" dur="7s" repeatCount="indefinite"
                                        values="M0,60 Q25,50 50,60 T100,60 L100,100 L0,100 Z;
                                                M0,60 Q25,70 50,60 T100,60 L100,100 L0,100 Z;
                                                M0,60 Q25,50 50,60 T100,60 L100,100 L0,100 Z" />
                                </path>
                            </svg>
                        </div>
                        <div className="max-w-4xl mx-auto px-6 py-20 relative z-10 text-center">
                            <div className="inline-flex items-center gap-2 px-4 py-2 rounded-full bg-cyan-500/20 text-cyan-300 font-semibold mb-6 border border-cyan-500/30 shadow-inner">
                                <i className="ph ph-drop text-xl"></i> Давление и плавание
                            </div>
                            <h1 className="text-5xl md:text-6xl font-extrabold mb-6 tracking-tight bg-clip-text text-transparent bg-gradient-to-r from-cyan-400 via-blue-400 to-indigo-400">
                                Гидростатика в деталях
                            </h1>
                            <p className="text-xl text-slate-300 max-w-2xl mx-auto">
                                Раздел физики, изучающий жидкости в состоянии покоя и условия плавания тел. Двумя фундаментальными понятиями здесь являются гидростатическое давление и выталкивающая сила.
                            </p>
                        </div>
                    </header>

                    <main className="max-w-4xl mx-auto px-6 py-12">
                        
                        {/* 1. Суть явления */}
                        <Section iconClass="ph ph-anchor" title="1. Суть явления" color="cyan">
                            <p className="mb-6">Любое погружение в жидкость сопровождается двумя мощными эффектами: давлением со стороны самой жидкости и выталкиванием наверх.</p>
                            
                            <div className="grid md:grid-cols-2 gap-6 mb-4">
                                <div className="bg-slate-50 border border-slate-200 rounded-xl p-5 shadow-sm relative overflow-hidden">
                                    <div className="absolute right-[-10px] top-[-10px] text-blue-100 opacity-50"><i className="ph ph-arrow-line-down text-8xl"></i></div>
                                    <h4 className="font-bold text-blue-800 mb-2 relative z-10 flex items-center gap-2">
                                        <i className="ph ph-arrows-in text-xl"></i>
                                        Гидростатическое давление
                                    </h4>
                                    <p className="text-sm text-slate-600 mb-3 relative z-10">Жидкость обладает весом, поэтому ее верхние слои давят на нижние. Чем глубже находится объект, тем больший столб жидкости давит на него сверху.</p>
                                    <div className="bg-blue-100 text-blue-800 p-3 rounded-lg text-sm relative z-10 italic border border-blue-200">
                                        <strong>Пример:</strong> При нырянии на дно бассейна или моря вы чувствуете, как закладывает уши — это следствие возрастающего с глубиной давления воды.
                                    </div>
                                </div>
                                
                                <div className="bg-slate-50 border border-slate-200 rounded-xl p-5 shadow-sm relative overflow-hidden ring-2 ring-cyan-400">
                                    <div className="absolute right-[-10px] top-[-10px] text-cyan-100 opacity-50"><i className="ph ph-arrow-line-up text-8xl"></i></div>
                                    <h4 className="font-bold text-cyan-800 mb-2 relative z-10 flex items-center gap-2">
                                        <i className="ph ph-paper-boat text-xl"></i>
                                        Закон Архимеда
                                    </h4>
                                    <p className="text-sm text-slate-600 mb-3 relative z-10">На любое тело, полностью или частично погруженное в жидкость (или газ), действует направленная вверх выталкивающая сила, равная <strong>весу вытесненной жидкости</strong>.</p>
                                    <div className="bg-cyan-100 text-cyan-800 p-3 rounded-lg text-sm relative z-10 italic border border-cyan-200">
                                        <strong>Пример:</strong> Тяжелый стальной корабль не тонет, так как внутри корпуса много пустого пространства. Он вытесняет огромный объем воды, и сила Архимеда компенсирует силу тяжести.
                                    </div>
                                </div>
                            </div>
                        </Section>

                        {/* 2. Визуализация */}
                        <Section iconClass="ph ph-image" title="2. Визуализация сил в жидкости" color="blue">
                            <p className="mb-4">
                                Обратите внимание: плавающее тело (дерево) вытесняет лишь часть своего объема, чтобы уравновесить силу тяжести. А полностью погруженное тело (металл на нити) вытесняет весь свой объем. Давление же растет с глубиной линейно.
                            </p>
                            
                            <div className="bg-white border-2 border-slate-200 rounded-2xl overflow-hidden relative shadow-inner mb-4 flex justify-center py-6 bg-slate-50">
                                <svg viewBox="0 0 500 350" className="w-full max-w-lg drop-shadow-md">
                                    {/* Tank walls */}
                                    <line x1="50" y1="20" x2="50" y2="300" stroke="#64748b" strokeWidth="6" strokeLinecap="round" />
                                    <line x1="450" y1="20" x2="450" y2="300" stroke="#64748b" strokeWidth="6" strokeLinecap="round" />
                                    <line x1="47" y1="300" x2="453" y2="300" stroke="#64748b" strokeWidth="6" strokeLinecap="round" />

                                    {/* Water body */}
                                    <path d="M 53 100 L 447 100 L 447 297 L 53 297 Z" fill="#cffafe" opacity="0.8" />
                                    {/* Water surface line */}
                                    <line x1="53" y1="100" x2="447" y2="100" stroke="#06b6d4" strokeWidth="3" strokeDasharray="10,5" />

                                    {/* --- Object 1: Floating Block (Ship/Wood) --- */}
                                    <g>
                                        {/* Bobbing animation */}
                                        <animateTransform attributeName="transform" type="translate" values="0 5; 0 -5; 0 5" dur="3s" repeatCount="indefinite" />
                                        <rect x="120" y="80" width="80" height="40" fill="#d97706" rx="4" stroke="#92400e" strokeWidth="2" />
                                        <text x="160" y="105" fill="white" fontSize="14" fontWeight="bold" textAnchor="middle">Дерево</text>
                                        
                                        {/* Forces on Floating Block */}
                                        {/* mg */}
                                        <line x1="160" y1="100" x2="160" y2="160" stroke="#ef4444" strokeWidth="3" markerEnd="url(#arrow-red)" />
                                        <text x="170" y="150" fill="#ef4444" fontSize="14" fontWeight="bold">mg</text>
                                        {/* F_A */}
                                        <line x1="160" y1="100" x2="160" y2="40" stroke="#06b6d4" strokeWidth="3" markerEnd="url(#arrow-cyan)" />
                                        <text x="170" y="60" fill="#0891b2" fontSize="14" fontWeight="bold">F_A</text>
                                    </g>

                                    {/* --- Object 2: Submerged Metal on string --- */}
                                    {/* String */}
                                    <line x1="320" y1="20" x2="320" y2="200" stroke="#94a3b8" strokeWidth="2" />
                                    <g>
                                        <rect x="290" y="200" width="60" height="60" fill="#94a3b8" rx="4" stroke="#475569" strokeWidth="2" />
                                        <text x="320" y="235" fill="white" fontSize="14" fontWeight="bold" textAnchor="middle">Металл</text>
                                        
                                        {/* Forces on Submerged Block */}
                                        {/* mg (longer because metal is heavy) */}
                                        <line x1="320" y1="230" x2="320" y2="320" stroke="#ef4444" strokeWidth="3" markerEnd="url(#arrow-red)" />
                                        <text x="330" y="310" fill="#ef4444" fontSize="14" fontWeight="bold">mg</text>
                                        {/* F_A (shorter than mg) */}
                                        <line x1="320" y1="230" x2="320" y2="180" stroke="#06b6d4" strokeWidth="3" markerEnd="url(#arrow-cyan)" />
                                        <text x="330" y="190" fill="#0891b2" fontSize="14" fontWeight="bold">F_A</text>
                                        {/* T (Tension) */}
                                        <line x1="320" y1="200" x2="320" y2="130" stroke="#3b82f6" strokeWidth="3" markerEnd="url(#arrow-blue)" />
                                        <text x="330" y="140" fill="#3b82f6" fontSize="14" fontWeight="bold">T (нить)</text>
                                    </g>

                                    {/* --- Pressure Indicators --- */}
                                    <g transform="translate(400, 100)">
                                        <text x="0" y="-10" fontSize="12" fill="#64748b" fontWeight="bold">Давление p</text>
                                        {/* Depth arrows increasing in size */}
                                        <line x1="20" y1="30" x2="-10" y2="30" stroke="#0284c7" strokeWidth="2" markerEnd="url(#arrow-blue)" />
                                        <line x1="20" y1="80" x2="-20" y2="80" stroke="#0284c7" strokeWidth="3" markerEnd="url(#arrow-blue)" />
                                        <line x1="20" y1="130" x2="-30" y2="130" stroke="#0284c7" strokeWidth="4" markerEnd="url(#arrow-blue)" />
                                        <line x1="20" y1="180" x2="-40" y2="180" stroke="#0284c7" strokeWidth="5" markerEnd="url(#arrow-blue)" />
                                        {/* Depth line */}
                                        <line x1="30" y1="0" x2="30" y2="190" stroke="#94a3b8" strokeWidth="2" />
                                        <path d="M 25 0 L 35 0 M 25 190 L 35 190" stroke="#94a3b8" strokeWidth="2" />
                                        <text x="40" y="100" fontSize="14" fill="#64748b" fontWeight="bold">h</text>
                                    </g>
                                </svg>
                            </div>
                        </Section>

                        {/* 3. Формулы */}
                        <Section iconClass="ph ph-math-operations" title="3. Математический аппарат (Формулы)" color="cyan">
                            
                            <div className="grid md:grid-cols-2 gap-4 mb-6">
                                <div>
                                    <Formula title="Гидростатическое давление">
                                        <span>p = ρ · g · h</span>
                                    </Formula>
                                    <p className="text-xs text-slate-500 text-center mb-2">Полное давление: P<sub>полн</sub> = P<sub>атм</sub> + ρgh</p>
                                </div>
                                
                                <div>
                                    <Formula title="Сила Архимеда">
                                        <span>F<sub>A</sub> = ρ<sub>ж</sub> · g · V<sub>погр</sub></span>
                                    </Formula>
                                </div>
                            </div>

                            <div className="bg-slate-50 border border-slate-200 rounded-xl p-5">
                                <h4 className="font-bold text-slate-700 uppercase text-xs tracking-wider mb-3">Расшифровка переменных (СИ):</h4>
                                <ul className="grid md:grid-cols-2 gap-2 text-sm text-slate-600 font-mono">
                                    <li><b>p</b> — гидростатическое давление (Па)</li>
                                    <li><b>F<sub>A</sub></b> — сила Архимеда (Н)</li>
                                    <li><b>ρ / ρ<sub>ж</sub></b> — плотность жидкости (кг/м³)</li>
                                    <li><b>g</b> — ускорение свободного падения (м/с²)</li>
                                    <li><b>h</b> — глубина погружения (м)</li>
                                    <li><b>V<sub>погр</sub></b> — погруженный объем (м³)</li>
                                </ul>
                            </div>
                        </Section>

                        {/* 4. Алгоритм */}
                        <Section iconClass="ph ph-list-numbers" title="4. Алгоритм решения" color="emerald">
                            <p className="mb-6">Задачи на плавание тел — это, по сути, задачи на <span className="font-bold text-emerald-600">статику</span>. Тело покоится, значит сумма сил равна нулю.</p>
                            
                            <div className="space-y-4">
                                <div className="flex gap-4 items-start bg-white p-4 rounded-xl border border-slate-100 shadow-sm">
                                    <div className="flex-shrink-0 w-8 h-8 rounded-full bg-emerald-100 text-emerald-700 flex items-center justify-center font-bold font-mono">1</div>
                                    <div>
                                        <h5 className="font-bold text-slate-800 mb-1">Выполнение чертежа</h5>
                                        <p className="text-sm">Изобразите тело, расставьте векторы сил: вниз — сила тяжести (mg); вверх — сила Архимеда (F_A) и, если есть, реакция дна (N) или натяжение нити (T).</p>
                                    </div>
                                </div>
                                <div className="flex gap-4 items-start bg-white p-4 rounded-xl border border-slate-100 shadow-sm">
                                    <div className="flex-shrink-0 w-8 h-8 rounded-full bg-emerald-100 text-emerald-700 flex items-center justify-center font-bold font-mono">2</div>
                                    <div>
                                        <h5 className="font-bold text-slate-800 mb-1">Применение законов Ньютона</h5>
                                        <p className="text-sm">Так как тело покоится, векторная сумма всех сил равна нулю. В проекции на вертикальную ось (вверх): <span className="font-mono bg-slate-100 px-1 rounded">F_A + T + N - mg = 0</span>.</p>
                                    </div>
                                </div>
                                <div className="flex gap-4 items-start bg-white p-4 rounded-xl border border-slate-100 shadow-sm">
                                    <div className="flex-shrink-0 w-8 h-8 rounded-full bg-emerald-100 text-emerald-700 flex items-center justify-center font-bold font-mono">3</div>
                                    <div>
                                        <h5 className="font-bold text-slate-800 mb-1">Детализация формул</h5>
                                        <p className="text-sm">Распишите F_A через плотность жидкости и погруженный объем (<span className="font-mono bg-slate-100 px-1 rounded">ρ_ж·g·V_погр</span>). Массу тела часто нужно расписать через плотность тела и его полный объем (<span className="font-mono bg-slate-100 px-1 rounded">m = ρ_т·V_т</span>).</p>
                                    </div>
                                </div>
                                <div className="flex gap-4 items-start bg-white p-4 rounded-xl border border-slate-100 shadow-sm">
                                    <div className="flex-shrink-0 w-8 h-8 rounded-full bg-emerald-100 text-emerald-700 flex items-center justify-center font-bold font-mono">4</div>
                                    <div>
                                        <h5 className="font-bold text-slate-800 mb-1">Математика</h5>
                                        <p className="text-sm">Подставьте расписанные формулы в уравнение равновесия, выразите искомую величину и посчитайте ответ.</p>
                                    </div>
                                </div>
                            </div>
                        </Section>

                        {/* 5. Разбор примера */}
                        <Section iconClass="ph ph-chalkboard-teacher" title="5. Разбор примера: Плавающий брусок" color="blue">
                            <ExampleCard 
                                defaultOpen={true}
                                title="Условие задачи"
                                iconClass="ph-wood"
                                color="blue"
                                condition={
                                    <>
                                        <p>Деревянный брусок массой <strong>m = 2 кг</strong> плавает на поверхности воды. Плотность воды составляет <strong>1000 кг/м³</strong>. Какой объем бруска находится под водой? Ускорение свободного падения принять равным <strong>10 м/с²</strong>.</p>
                                    </>
                                }
                                analysis={
                                    <div className="space-y-4">
                                        <p><strong>1. Физическая модель:</strong> Брусок плавает в состоянии покоя. На него действуют всего две силы, которые уравновешивают друг друга: сила тяжести ($mg$) направлена вниз, сила Архимеда ($F_A$) направлена вверх.</p>
                                        
                                        <div className="bg-blue-50 p-4 rounded border border-blue-200 font-mono text-sm space-y-2">
                                            <div className="font-bold text-blue-900 text-center text-lg mb-2">F<sub>A</sub> = mg</div>
                                        </div>

                                        <p><strong>2. Формула выталкивающей силы:</strong> Распишем силу Архимеда по определению.</p>
                                        <div className="bg-blue-50 p-4 rounded border border-blue-200 font-mono text-sm space-y-2 text-center text-lg text-blue-900 font-bold">
                                            ρ<sub>в</sub> · g · V<sub>погр</sub> = m · g
                                        </div>

                                        <p><strong>3. Преобразования:</strong> Сокращаем ускорение свободного падения $g$ с обеих сторон.</p>
                                        <div className="font-mono bg-white p-3 rounded border text-center shadow-inner font-bold text-slate-700">
                                            ρ<sub>в</sub> · V<sub>погр</sub> = m<br/>
                                            <span className="text-cyan-600 mt-2 inline-block">V<sub>погр</sub> = m / ρ<sub>в</sub></span>
                                        </div>

                                        <p><strong>4. Вычисления:</strong></p>
                                        <div className="font-mono bg-white p-2 rounded border inline-block">
                                            V<sub>погр</sub> = 2 кг / 1000 кг/м³ = <span className="text-blue-600 font-bold">0.002 м³</span>
                                        </div>

                                        <div className="bg-blue-800 text-blue-100 p-4 rounded-lg mt-4 text-center font-bold shadow-md text-lg">
                                            Ответ: Объем погруженной части бруска равен 0.002 м³ (или 2 литра).
                                        </div>
                                    </div>
                                }
                            />
                        </Section>

                        {/* 6. Проверочная задача */}
                        <Section iconClass="ph ph-exam" title="6. Проверочная задача" color="cyan">

                            <ExampleCard 
                                title="Цилиндр в масле"
                                iconClass="ph-cylinder"
                                color="cyan"
                                condition={
                                    <>
                                        <p>Сплошной металлический цилиндр объемом <strong>0.05 м³</strong> целиком погружен в машинное масло и удерживается в состоянии покоя. Плотность машинного масла равна <strong>900 кг/м³</strong>.</p>
                                        <p className="mt-2 text-slate-800 font-semibold">Вычислите выталкивающую силу (силу Архимеда), действующую на цилиндр со стороны масла. Примите $g = 10$ м/с².</p>
                                    </>
                                }
                                analysis={
                                    <div className="space-y-4 text-cyan-950">
                                        <p><strong>1. Дано:</strong></p>
                                        <ul className="list-disc pl-5 font-mono text-sm space-y-1 text-slate-700">
                                            <li>Объем тела (и он же погруженный объем, так как тело погружено <i>целиком</i>): <span className="font-bold">V<sub>погр</sub> = 0.05 м³</span></li>
                                            <li>Плотность жидкости (масла): <span className="font-bold">ρ<sub>масла</sub> = 900 кг/м³</span></li>
                                            <li>Ускорение свободного падения: <span className="font-bold">g = 10 м/с²</span></li>
                                        </ul>

                                        <p><strong>2. Формула:</strong> Для нахождения выталкивающей силы применяем закон Архимеда.</p>
                                        <div className="bg-cyan-100 p-3 rounded font-mono text-center font-bold border border-cyan-200 text-lg shadow-inner">
                                            F<sub>A</sub> = ρ<sub>масла</sub> · g · V<sub>погр</sub>
                                        </div>

                                        <p><strong>3. Вычисления:</strong> Подставляем все значения в формулу.</p>
                                        <div className="font-mono bg-white p-3 rounded border text-sm space-y-1 text-center font-bold text-slate-700">
                                            F<sub>A</sub> = 900 · 10 · 0.05<br/>
                                            F<sub>A</sub> = 9000 · 0.05<br/>
                                            F<sub>A</sub> = <span className="text-cyan-600 text-xl">450 Н</span>
                                        </div>

                                        <div className="bg-cyan-800 text-cyan-50 p-4 rounded-lg mt-4 text-center font-bold shadow-md text-lg">
                                            Ответ: Выталкивающая сила (сила Архимеда) равна 450 Н.
                                        </div>
                                        
                                        <div className="mt-2 text-xs text-center text-cyan-600">
                                            <em>Примечание:</em> В этой задаче нам даже не потребовалось применять Второй закон Ньютона или знать массу цилиндра, так как нас просили найти только саму силу Архимеда по её прямому определению.
                                        </div>
                                    </div>
                                }
                            />
                        </Section>

                    </main>
                    
                    <footer className="bg-slate-900 text-slate-400 py-10 text-center text-sm border-t-4 border-cyan-500">
                        <p className="flex items-center justify-center gap-2">
                            <i className="ph ph-anchor-simple text-xl text-cyan-400"></i>
                            Интерактивный гид по физике. Желаем не утонуть в море знаний!
                        </p>
                    </footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
